<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Gallery</title>
    <style>
        :root {
            --primary: #5c675c; /* Elegant sage green */
            --bg: #faf9f6;      /* Off-white */
            --text: #333333;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
            background: white;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        h1 { font-family: Georgia, serif; font-weight: 300; margin-bottom: 10px; color: var(--primary); }
        p { color: #666; margin-bottom: 25px; font-size: 0.95rem; }

        .upload-zone {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            position: relative;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .upload-zone:hover { border-color: var(--primary); background: #fdfdfd; }

        #fileInput { display: none; }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:disabled { background-color: #ccc; cursor: not-allowed; }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            margin-top: 15px;
        }

        .counter { margin: 15px 0; font-size: 0.9rem; font-weight: bold; }
        
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .preview-grid img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
        }

        .status { margin-top: 15px; font-size: 0.9rem; color: var(--primary); min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Capture the Love</h1>
        <p>Please share your favorite moments with us!<br>You can upload up to 10 photos.</p>

        <div class="upload-zone" onclick="triggerInput()">
            <svg width="48" height="48" fill="none" stroke="#5c675c" stroke-width="2" viewBox="0 0 24 24" style="margin-bottom: 10px;">
                <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 002-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div id="uploadText">Tap to take a photo or choose from library</div>
            <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
        </div>

        <div class="counter"><span id="countText">0</span> / 10 Photos Uploaded</div>
        
        <button id="uploadBtn" class="btn" onclick="uploadImages()" disabled>Upload Selected Photos</button>
        
        <div id="statusMessage" class="status"></div>

        <div class="preview-grid" id="previewGrid"></div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0 20px 0;">
        
        <!-- REPLACE THE LINK BELOW WITH YOUR GOOGLE SHEET/GALLERY LINK -->
        <a href="https://docs.google.com/spreadsheets" target="_blank" class="btn btn-secondary">View Everyone's Photos</a>
    </div>

    <script>
        // CONFIGURATION: Replace with your free api key from freeimage.host or imgbb.com
        const IMGBB_API_KEY = '6c8331cc792afe823aec5af89a7d763d';
        // CONFIGURATION: Replace with your Google Apps Script Web App URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby4GRiLUTKEJuLYufkFPH1DNtrMT-orlnTeDeKXYYNrc62ByihJd8auSEuDPXnFeYLp6Q/exec';

        let totalUploaded = parseInt(localStorage.getItem('wedding_upload_count')) || 0;
        let selectedFiles = [];

        updateCounter();

        function triggerInput() {
            if (totalUploaded >= 10) {
                alert("You've reached your limit of 10 photos! Thank you for sharing!");
                return;
            }
            document.getElementById('fileInput').click();
        }

        function handleFiles(files) {
            const remainingSlots = 10 - totalUploaded;
            const filesToProcess = Array.from(files).slice(0, remainingSlots);
            
            selectedFiles = filesToProcess;
            document.getElementById('previewGrid').innerHTML = '';

            filesToProcess.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    document.getElementById('previewGrid').appendChild(img);
                }
                reader.readAsDataURL(file);
            });

            if(selectedFiles.length > 0) {
                document.getElementById('uploadBtn').disabled = false;
                document.getElementById('uploadText').innerText = `${selectedFiles.length} files selected`;
            }
        }

        function updateCounter() {
            document.getElementById('countText').innerText = totalUploaded;
            if (totalUploaded >= 10) {
                document.getElementById('uploadBtn').disabled = true;
                document.getElementById('uploadText').innerText = "10 photo limit reached!";
            }
        }

        async function uploadImages() {
            const status = document.getElementById('statusMessage');
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            
            status.innerText = "Sending photos to the gallery... please wait.";

            for (let i = 0; i < selectedFiles.length; i++) {
                let formData = new FormData();
                formData.append('image', selectedFiles[i]);

                try {
                    // 1. Upload to ImgBB
                    let response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    let data = await response.json();
                    let imageUrl = data.data.url;

                    // 2. Send image link to Google Sheets
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: imageUrl, timestamp: new Date().toISOString() })
                    });

                    totalUploaded++;
                    localStorage.setItem('wedding_upload_count', totalUploaded);
                    updateCounter();

                } catch (error) {
                    console.error("Upload failed", error);
                }
            }

            status.innerText = "Success! Your photos are in the shared space.";
            selectedFiles = [];
            document.getElementById('previewGrid').innerHTML = '';
        }
    </script>
</body>
</html>
